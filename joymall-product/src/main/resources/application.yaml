#数据源
spring:
  datasource:
    username: root
    password: your-password
    url: jdbc:mysql://your-mysql-host:3306/joymall_pms?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
  session:
    store-type: redis


  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  thymeleaf:
    cache: false
  redis:
    host: your-redis-host
    port: 6379







  #OSS存储
  cloud:
    alicloud:
      access-key: your-access-key
      secret-key: your-secret-key
      oss:
        endpoint: your-oss-endpoint
        bucket: your-bucket

    sentinel:
      transport:
        port: 8719
        dashboard: your-sentinel-dashboard:8858




#mybatis-plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  #数据库主键自增
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1  #逻辑删除，1表示以及删除
      logic-not-delete-value: 0 #没删除


server:
  port: 10000
logging:
  level:
    com.joy.joymall: debug
    com.alibaba.nacos.client.config.impl: warn




