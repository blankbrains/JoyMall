<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title></title>
    <script type="text/javascript" src="http://cart.joymall.com/static/cart/js/jquery-3.1.1.min.js"></script>
    <script type="text/javascript" src="http://cart.joymall.com/static/cart/bootstrap/js/bootstrap.js"></script>
    <script type="text/javascript" src="http://cart.joymall.com/static/cart/js/swiper.min.js"></script>
    <script src="http://cart.joymall.com/static/cart/js/swiper.min.js"></script>
    <link rel="stylesheet" type="text/css" href="http://cart.joymall.com/static/cart/css/swiper.min.css"/>
    <link rel="stylesheet" type="text/css" href="http://cart.joymall.com/static/cart/bootstrap/css/bootstrap.css"/>
    <link rel="stylesheet" type="text/css" href="http://cart.joymall.com/static/cart/css/success.css"/>

</head>

<body>
<!--头部-->
<div class="alert-info">
    <div class="hd_wrap_top">
        <ul class="hd_wrap_left">
            <li class="hd_home"><i class="glyphicon glyphicon-home"></i>
                <a href="http://joymall.com">金磊商城首页</a>
            </li>

        </ul>

        <ul class="hd_wrap_right" style="width: 200px;">
            <li class="forel" style="border: 0;">
                <a href="http://cart.joymall.comhttp://auth.joymall.com/login.html" class="link_login"
                   th:text="${session.loginUser == null ? '你好，请登录' : '欢迎，' + session.loginUser.nickname}">你好,请登录</a>&nbsp;
                <a href="http://cart.joymall.com/http://auth.joymall.com/register.html" class="link_regist"
                   th:if="${session.loginUser == null}">免费注册</a>
            </li>
            <li class="spacer"></li>

            <li>
                <a href="http://cart.joymall.com">我的订单</a>
            </li>


        </ul>

    </div>
</div>

<div class="nav-tabs-justified">
    <div class="nav_wrap">

        <div class="nav_top">
            <div class="nav_top_one">
                <a href="http://cart.joymall.comhttp://joymall.com"><img
                        src="http://cart.joymall.com/static/cart/img/logo1.jpg"
                        style="height: 60px;width:180px;"/></a>
            </div>
            <div class="nav_top_two"><input type="text"/>
                <button>搜索</button>
            </div>


        </div>

    </div>
</div>

<div class="main">

    <div class="success-wrap">
        <div class="w" id="result">
            <div class="m succeed-box">
                <div th:if="${orderSn != null}" class="mc success-cont">
                    <h1>恭喜，秒杀成功，订单号[[${orderSn}]]</h1>
                    <h2>正在准备订单数据，10s后跳转到地址选择。。。<a th:href="${'http://cart.joymall.com/payOrder?orderSn=' + orderSn}">去支付</a>
                    </h2>

                </div>
                <div th:if="${orderSn == null}">
                    <h1>秒杀失败，下次再来</h1>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
<script type="text/javascript" src="http://cart.joymall.com/static/cart/js/success.js"></script>

</html>
